      <section class="card">
        <h2>수집하는 개인정보</h2>

          뉴스레터 구독 및 회원가입을 위해 이메일 주소, 이름, 비밀번호를 수집할

          개인정보는 서비스 제공 기간 동안 보관되며, 이용자가 삭제를 요청하면
          지체 없이 파기합니다.
        </p>
      </section>
